name: chatxap
description: ChatXAP - Global Chat Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView — core of Phase 1
  flutter_inappwebview: ^6.1.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Notifications with inline reply
  flutter_local_notifications: ^18.0.1

  # Permissions (camera, mic, notifications)
  permission_handler: ^11.3.1

  # Session persistence
  shared_preferences: ^2.3.3

  # Network connectivity detection
  connectivity_plus: ^6.1.0

  # Open external links (terms, privacy policy, etc.)
  url_launcher: ^6.3.1

  # ── NEW: Game dependencies ──────────────────────────────────────
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    # ── NEW: Game sound assets ────────────────────────────────────
    - assets/sounds/shoot.wav
    - assets/sounds/explosion.wav
    - assets/sounds/powerup.wav
    - assets/sounds/hit.wav
    - assets/sounds/gameover.wav
    - assets/sounds/levelup.wav
    - assets/sounds/background.mp3
