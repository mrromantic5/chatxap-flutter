name: chatxap
description: ChatXAP - Global Chat Platform
publish_to: 'none'
version: 1.1.2+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView — core Phase 1 shell
  flutter_inappwebview: ^6.1.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_crashlytics: ^4.1.3
  firebase_performance: ^0.10.0+3

  # Notifications with inline reply
  flutter_local_notifications: ^18.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.3

  # Secure storage — PIN hash stored in Android Keystore / iOS Keychain
  flutter_secure_storage: ^9.2.2

  # Cryptographic hashing — SHA-256 for PIN
  crypto: ^3.0.3

  # Connectivity
  connectivity_plus: ^6.1.0

  # External links
  url_launcher: ^6.3.1

  # Biometric lock
  local_auth: ^2.3.0

  # In-app update
  in_app_update: ^4.2.3

  # Native share sheet
  share_plus: ^10.1.4

  # Remote Config + Force Update
  firebase_remote_config: ^5.1.3

  # Package info for version checking
  package_info_plus: ^8.1.2

  # Background sync
  workmanager: ^0.6.0

  # Certificate pinning
  http: ^1.2.2

  # Game audio
  audioplayers: ^6.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/sounds/shoot.wav
    - assets/sounds/explosion.wav
    - assets/sounds/powerup.wav
    - assets/sounds/hit.wav
    - assets/sounds/gameover.wav
    - assets/sounds/levelup.wav
    - assets/sounds/background.mp3
