name: Build ChatXAP APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Flutter stable ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # ── 4. Verify Flutter ─────────────────────────────────────────
      - name: Flutter version check
        run: |
          flutter --version
          flutter doctor --android-licenses || true

      # ── 5. Write google-services.json from GitHub Secret ──────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ google-services.json written"
          cat android/app/google-services.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('Project ID:', d['project_info']['project_id'])"

      # ── 6. Write keystore from GitHub Secret ──────────────────────
      - name: Write keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "✅ Keystore written"
          ls -lh android/app/keystore.jks

      # ── 7. Verify assets ──────────────────────────────────────────
      - name: Verify assets
        run: |
          echo "=== Assets folder ==="
          ls -la assets/
          echo "=== Dart files ==="
          ls -la lib/
          echo "=== Android app folder ==="
          ls -la android/app/

      # ── 8. Flutter pub get ────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 9. Flutter analyze (catch errors before build) ────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos || true

      # ── 10. Build release APK ─────────────────────────────────────
      - name: Build release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/debug-info
          echo "✅ APK built successfully"
          ls -lh build/app/outputs/flutter-apk/

      # ── 11. Build release AAB ─────────────────────────────────────
      - name: Build release AAB
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/debug-info
          echo "✅ AAB built successfully"
          ls -lh build/app/outputs/bundle/release/

      # ── 12. Upload APK ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatXAP-release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      # ── 13. Upload AAB ────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatXAP-release-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      # ── 14. Build summary ─────────────────────────────────────────
      - name: Build summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║        ChatXAP Build Complete ✅          ║"
          echo "╠══════════════════════════════════════════╣"
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          AAB_SIZE=$(du -sh build/app/outputs/bundle/release/app-release.aab | cut -f1)
          echo "║  APK size: $APK_SIZE                         ║"
          echo "║  AAB size: $AAB_SIZE                         ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Download from Actions → Artifacts tab   ║"
          echo "║  APK → Install on phone to test          ║"
          echo "║  AAB → Upload to Google Play Console     ║"
          echo "╚══════════════════════════════════════════╝"
